name = "personal-mail-reminder"
main = "src/index.ts"
compatibility_date = "2026-06-07"
workers_dev = false
preview_urls = false
keep_vars = true

# Routes/custom domains are managed in the Cloudflare dashboard so this public
# config does not expose a personal domain.

[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
head_sampling_rate = 1
invocation_logs = true

[triggers]
crons = ["* * * * *"]

[[queues.producers]]
binding = "REMINDER_QUEUE"
queue = "personal-mail-reminder-delivery"

[[queues.consumers]]
queue = "personal-mail-reminder-delivery"
max_batch_size = 10
max_batch_timeout = 2
max_retries = 10
retry_delay = 60
dead_letter_queue = "personal-mail-reminder-delivery-dlq"

[[queues.consumers]]
queue = "personal-mail-reminder-delivery-dlq"
max_batch_size = 10
max_batch_timeout = 5

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/auth/*", "/admin/*", "/user/*", "/client-error", "/health"]

# Runtime variables are configured in the Worker dashboard and kept on deploy:
# FROM_EMAIL, REPLY_EMAIL, EMAIL_DELIVERY.
# Local development reads the same keys from .dev.vars.

[vars]
TIMEZONE = "Asia/Shanghai"

[[d1_databases]]
binding = "DB"
database_name = "personal-reminder"
# database_id is intentionally omitted for the public repository.
