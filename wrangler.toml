name = "personal-mail-reminder"
main = "src/index.ts"
compatibility_date = "2026-06-07"
workers_dev = false
preview_urls = false
keep_vars = true

# Routes/custom domains are managed in the Cloudflare dashboard so this public
# config does not expose a personal domain.

[triggers]
crons = ["* * * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/auth/*", "/admin/*", "/user/*", "/health"]

# Runtime variables are configured in the Worker dashboard and kept on deploy:
# TIMEZONE, FROM_EMAIL, REPLY_EMAIL, EMAIL_DELIVERY.
# Local development reads the same keys from .dev.vars.

[[d1_databases]]
binding = "DB"
database_name = "personal-reminder"
# database_id is intentionally omitted for the public repository.
